name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025-vs2026
    permissions:
      contents: write   # needed for creating GitHub Releases on tag push
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # MinVer needs full history to compute versions

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Dalamud (for InternalData/PlayerEnrichment)
        shell: pwsh
        run: |
          $hookDir = "$env:APPDATA\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Path $hookDir -Force | Out-Null
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Path latest.zip -DestinationPath $hookDir -Force

      - name: Restore
        env:
          GITHUB_PACKAGES_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet restore NexusKit.Modules.sln

      - name: Audit NuGet dependencies for known vulnerabilities
        shell: pwsh
        env:
          GITHUB_PACKAGES_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $output = dotnet list NexusKit.Modules.sln package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match '\b(High|Critical)\b') {
            Write-Host "::error::Vulnerable NuGet dependency at High or Critical severity — review the report above and update before merging."
            exit 1
          }

      - name: List outdated NuGet dependencies (informational)
        continue-on-error: true
        env:
          GITHUB_PACKAGES_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet list NexusKit.Modules.sln package --outdated --include-transitive

      - name: Build
        env:
          GITHUB_PACKAGES_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet build NexusKit.Modules.sln -c Release --no-restore

      - name: Pack
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_PACKAGES_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet pack NexusKit.Modules.sln -c Release --no-build -o ./artifacts

      - name: Push to GitHub Packages
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_PACKAGES_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem ./artifacts -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --source github-nexusffxiv --skip-duplicate
          }

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: nupkgs
          path: ./artifacts/*.nupkg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
